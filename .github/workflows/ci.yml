name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - working-directory: frontend
        run: flutter pub get
      - working-directory: frontend
        run: flutter analyze
      - working-directory: frontend
        run: flutter test
      - working-directory: frontend
        run: python3 scripts/check_arb_completeness.py

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - working-directory: backend
        run: uv sync
      - working-directory: backend
        run: uv run python -c "import app.main"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f vorrat/Dockerfile -t vorrat .
