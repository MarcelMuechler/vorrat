name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - working-directory: frontend
        run: flutter pub get
      - working-directory: frontend
        run: flutter analyze
      - working-directory: frontend
        run: flutter test
      - working-directory: frontend
        run: python3 scripts/check_arb_completeness.py

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      # Rejects a PR (including the release-please PR) whose backend/uv.lock
      # has drifted from backend/pyproject.toml -- e.g. a version bump that
      # landed without a re-lock. See #164: this used to only be caught (and
      # fixed) *after* a release was already tagged.
      - working-directory: backend
        run: uv lock --check
      - working-directory: backend
        run: uv sync --frozen
      - working-directory: backend
        run: uv run python -c "import app.main"
      # release-please's extra-files config keeps these four version strings
      # in lockstep within a single release-PR commit, but nothing enforces
      # that the extra-files config itself stays correct -- so double-check
      # explicitly that a release is never cut with them out of sync.
      - name: Verify backend, lock, Flutter, and add-on versions match
        run: |
          backend=$(grep -m1 '^version = ' backend/pyproject.toml | cut -d'"' -f2)
          lock=$(grep -A1 '^name = "vorrat-backend"' backend/uv.lock | grep '^version' | cut -d'"' -f2)
          pubspec=$(grep -m1 '^version:' frontend/pubspec.yaml | awk '{print $2}')
          addon=$(grep -m1 '^version:' vorrat/config.yaml | tr -d '"' | awk '{print $2}')
          echo "backend=$backend lock=$lock pubspec=$pubspec addon=$addon"
          if [ "$backend" != "$lock" ] || [ "$backend" != "$pubspec" ] || [ "$backend" != "$addon" ]; then
            echo "::error::Version mismatch across release files (backend=$backend lock=$lock pubspec=$pubspec addon=$addon)"
            exit 1
          fi

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: docker build -f vorrat/Dockerfile -t vorrat .

      - name: Verify image dependencies match backend/uv.lock
        run: uv run backend/scripts/check_image_deps.py vorrat
      - name: Scan built image for known vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: vorrat
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      # Run the actual production image the way README.md's "Running standalone via
      # Docker" section documents (-v ...:/data — the run script's `alembic upgrade
      # head` fails without it, since SQLite can't create the missing /data dir on
      # its own). This is a fresh named volume every run, so alembic upgrade head
      # runs against a fresh SQLite db from scratch every time — see
      # vorrat/rootfs/etc/services.d/vorrat/run, which runs it before starting uvicorn.
      - name: Start container
        run: docker run -d --name vorrat -p 8099:8099 -v vorrat-data:/data vorrat

      - name: Wait for readiness
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8099/api/health > /dev/null; then
              echo "backend is up"
              exit 0
            fi
            sleep 1
          done
          echo "backend did not become ready in time"
          docker logs vorrat
          exit 1

      # No X-Ingress-Path header here (standalone container, no HA supervisor in
      # front of it) -- main.py's "/" route falls back to base href "/".
      - name: Verify /api/health and the Flutter root document
        run: |
          curl -sf http://localhost:8099/api/health | grep -q '"status": *"ok"'
          curl -sf http://localhost:8099/ | grep -qF '<base href="/">'

      - name: Run smoke test suite
        working-directory: backend
        run: BASE=http://localhost:8099 ./scripts/smoke_test.sh

      - name: Container logs
        if: always()
        run: docker logs vorrat
