name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Uses the default GITHUB_TOKEN, which keeps this working with zero
      # setup. Trade-off: pushes/tags made with GITHUB_TOKEN don't trigger
      # *other* workflows (a GitHub Actions restriction) -- irrelevant here
      # since everything that needs to react to a new release is a step
      # below in this same job, not a separate tag-triggered workflow.
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please bumps backend/pyproject.toml's version field via
      # extra-files, but has no way to re-derive uv.lock's embedded copy of
      # that same value -- it only edits the files it's told about, it can't
      # execute arbitrary commands. Re-deriving the lock *after* the tag was
      # already cut (as this used to do -- see the commit history around the
      # 0.4.0 release, and #164) left the tagged commit itself internally
      # inconsistent forever, since the fix-up commit landed on main only
      # after the tag already existed. Instead, push the up-to-date lock
      # straight onto the release PR's own branch on every run that
      # creates/updates that PR, so by the time anyone merges it the lock is
      # already correct and the resulting tag is too. (On the run that
      # actually merges the PR and cuts the release, `pr` is empty -- release
      # PRs aren't reopened right after being merged -- so there's nothing
      # left to patch; `uv lock --check` in CI already gated the merge on the
      # lock being in sync.)
      #
      # `pr.headBranchName` is release-please's own generated branch name
      # (e.g. "release-please--branches--main"), not attacker-controlled
      # text like a PR title/body. It's used directly as a `with:` action
      # input below (an input value, not a shell command, so it isn't
      # subject to command injection the way `run:` interpolation is), and
      # piped through `env:` before the one place it *is* interpolated into
      # a shell script, per this repo's existing convention for dynamic
      # values in `run:` steps.
      - if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
      - if: ${{ steps.release.outputs.pr }}
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - if: ${{ steps.release.outputs.pr }}
        working-directory: backend
        run: uv lock
      - if: ${{ steps.release.outputs.pr }}
        env:
          HEAD_BRANCH: ${{ steps.release.outputs.pr && fromJSON(steps.release.outputs.pr).headBranchName || '' }}
        run: |
          if ! git diff --quiet -- backend/uv.lock; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add backend/uv.lock
            git commit -m "chore: sync uv.lock with the release PR"
            git push origin "HEAD:refs/heads/$HEAD_BRANCH"
          fi

      # Syncs the wrapper repo (vorrat-hassio-addon) that HA's add-on store
      # actually points at (see README's "Installing on Home Assistant") --
      # its config.yaml version and Dockerfile's VORRAT_REF pin both need to
      # track this repo's new tag, or HA never notices a release exists (see
      # #11's history) and Docker's build cache silently keeps serving
      # whatever was cloned on the very first build (see #19's original bug
      # report). It also carries over CHANGELOG.md so Supervisor's "What's
      # new" dialog has something to show (#193) -- HA reads that file from
      # the add-on's own root, which is vorrat/ in the wrapper repo, not
      # anywhere in this one. This repo's root CHANGELOG.md (written by
      # release-please) is already in the Keep a Changelog format HA expects,
      # so it's fetched straight from the tag via raw.githubusercontent.com
      # rather than duplicated -- no checkout step runs on this path.
      #
      # Requires a `HASSIO_ADDON_PAT` repository secret: a PAT (classic or
      # fine-grained) with write access to vorrat-hassio-addon. The default
      # GITHUB_TOKEN can't be used for this step -- it's scoped to this repo
      # only and has no access to push to a different repository. Until
      # that secret is added, this step fails loudly rather than silently
      # skipping, so a missing/expired token doesn't quietly reintroduce the
      # exact bug this automates away.
      #
      # TAG_NAME comes from release-please's own `tag_name` action output
      # (e.g. "v0.16.0"), not from any user-controlled event field, so it's
      # safe to interpolate into the curl URL and sed patterns below.
      - if: ${{ steps.release.outputs.release_created }}
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          HASSIO_ADDON_PAT: ${{ secrets.HASSIO_ADDON_PAT }}
        run: |
          git clone "https://x-access-token:${HASSIO_ADDON_PAT}@github.com/MarcelMuechler/vorrat-hassio-addon.git" /tmp/vorrat-hassio-addon
          cd /tmp/vorrat-hassio-addon
          sed -i "s/^version: .*/version: \"${TAG_NAME#v}\"/" vorrat/config.yaml
          sed -i "s/^ARG VORRAT_REF=.*/ARG VORRAT_REF=${TAG_NAME}/" vorrat/Dockerfile
          curl -sf "https://raw.githubusercontent.com/MarcelMuechler/Vorrat/${TAG_NAME}/CHANGELOG.md" -o vorrat/CHANGELOG.md
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add vorrat/config.yaml vorrat/Dockerfile vorrat/CHANGELOG.md
            git commit -m "chore: bump to $TAG_NAME"
            git push
          fi
