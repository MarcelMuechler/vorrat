name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Uses the default GITHUB_TOKEN, which keeps this working with zero setup.
      # Trade-off: pushes/tags made with GITHUB_TOKEN don't trigger *other*
      # workflows (a GitHub Actions restriction) -- so the tag this creates
      # won't auto-fire a future "sync vorrat-hassio-addon" workflow (#19).
      # If/when #19 needs that, switch `token:` to a PAT stored as a repo
      # secret instead.
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please bumps backend/pyproject.toml's version field via
      # regex, but has no way to re-derive uv.lock's embedded copy of that
      # same value -- forgetting this once already required a manual fix
      # (see the commit history around the 0.4.0 release), so re-derive it
      # here whenever this run is the one that actually cut a release.
      - if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4
      - if: ${{ steps.release.outputs.release_created }}
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - if: ${{ steps.release.outputs.release_created }}
        working-directory: backend
        run: uv lock
      - if: ${{ steps.release.outputs.release_created }}
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          if ! git diff --quiet -- backend/uv.lock; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add backend/uv.lock
            git commit -m "chore: sync uv.lock with the $TAG_NAME release"
            git push
          fi
